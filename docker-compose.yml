services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: suomi
      POSTGRES_PASSWORD: suomi_secret
      POSTGRES_DB: suomi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suomi -d suomi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: nguyenthao1192/suomi-backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach Ollama on the host

  frontend:
    image: nguyenthao1192/suomi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  postgres_data:
